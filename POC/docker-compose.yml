version: "3.9"

networks:
  ai-metrics:
    driver: bridge

services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: ai-metrics-api
    depends_on:
      - postgres
      - azurite
    networks:
      - ai-metrics

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER:     user
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       ai_metrics
    ports:
      - "5432:5432"
    networks:
      - ai-metrics

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
    networks:
      - ai-metrics
    command: azurite-blob --blobHost 0.0.0.0

