receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Tells the loki exporter which resource attributes to promote to stream labels.
  # Only low-cardinality fields — high-cardinality values stay in the log body.
  resource/loki:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name

exporters:
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: false
      job: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    logs:
      receivers: [otlp]
      processors: [batch, resource/loki]
      exporters: [loki]

  telemetry:
    metrics:
      address: "0.0.0.0:8888"
